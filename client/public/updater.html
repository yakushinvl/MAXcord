<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>maxcord Updater</title>
    <style>
        :root {
            --bg-dark: #09090b;
            --accent: #5865f2;
            --secondary: #00ffa3;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --text: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.5);
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg-dark);
            color: var(--text);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
            -webkit-app-region: drag;
        }

        .container {
            width: 320px;
            padding: 48px;
            background: var(--glass);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid var(--border);
            border-radius: 40px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4);
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .logo-outer {
            width: 100px;
            height: 100px;
            margin-bottom: 28px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-inner {
            width: 100%;
            height: 100%;
            border-radius: 28px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            z-index: 2;
        }

        .app-logo {
            width: 64px;
            height: 64px;
            object-fit: contain;
            filter: drop-shadow(0 0 15px rgba(255, 255, 255, 0.2));
            animation: pulse-gentle 4s ease-in-out infinite;
        }

        .logo-glow {
            position: absolute;
            width: 140%;
            height: 140%;
            background: radial-gradient(circle, var(--accent) 0%, transparent 70%);
            opacity: 0.15;
            filter: blur(20px);
            z-index: 1;
            animation: rotate-slow 10s linear infinite;
        }

        .brand-title {
            font-size: 28px;
            font-weight: 850;
            margin: 0 0 8px;
            letter-spacing: -0.03em;
            background: linear-gradient(to bottom, #fff, #999);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-text {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 32px;
            letter-spacing: 0.02em;
            min-height: 20px;
        }

        .progress-box {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 100px;
            overflow: hidden;
            position: relative;
            display: none;
        }

        .fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #5865f2, #8e58f2);
            box-shadow: 0 0 15px rgba(88, 101, 242, 0.5);
            border-radius: 100px;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .fill::after {
            content: '';
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            animation: shim 2s infinite;
        }

        @keyframes shim {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        @keyframes rotate-slow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes pulse-gentle {
            0%, 100% { transform: scale(1); opacity: 0.9; }
            50% { transform: scale(1.05); opacity: 1; }
        }

        .loading-dots:after {
            content: '.';
            animation: dots 1.5s steps(4, end) infinite;
        }

        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60% { content: '...'; }
            80%, 100% { content: ''; }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="logo-outer">
            <div class="logo-glow"></div>
            <div class="logo-inner">
                <img src="icon.ico" alt="logo" class="app-logo">
            </div>
        </div>
        <h1 class="brand-title">maxcord</h1>
        <div id="status" class="status-text">Проверка обновлений<span class="loading-dots"></span></div>
        <div id="progress-wrapper" class="progress-box">
            <div class="fill" id="progress-bar"></div>
        </div>
    </div>

    <script>
        const { ipcRenderer } = require('electron');
        const statusElement = document.getElementById('status');
        const progressWrapper = document.getElementById('progress-wrapper');
        const progressBar = document.getElementById('progress-bar');

        ipcRenderer.on('updater-message', (event, text) => {
            statusElement.innerText = text;
        });

        ipcRenderer.on('updater-progress', (event, percent) => {
            progressWrapper.style.display = 'block';
            progressBar.style.width = percent + '%';
            statusElement.innerText = `Загрузка: ${Math.round(percent)}%`;
        });
    </script>
</body>

</html>
