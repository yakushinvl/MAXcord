<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>maxcord Updater</title>
    <style>
        :root {
            --bg-dark: #020205;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-primary: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.5);
            --accent-primary: #00f2ff;
            --accent-secondary: #7000ff;
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg-dark);
            color: var(--text-primary);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
            -webkit-app-region: drag;
        }

        .container {
            width: 280px;
            padding: 40px;
            background: var(--glass-bg);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .logo-container {
            width: 70px;
            height: 70px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .z-logo {
            font-size: 48px;
            font-weight: 900;
            background: linear-gradient(135deg, #fff, #888);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.2));
            margin: 0;
            line-height: 1;
        }

        h1 {
            font-size: 22px;
            margin: 0 0 8px;
            font-weight: 800;
            letter-spacing: -0.5px;
            opacity: 0.9;
        }

        .status {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 32px;
            font-weight: 500;
            letter-spacing: 0.3px;
            min-height: 20px;
        }

        .progress-wrapper {
            width: 100%;
            display: none;
        }

        .progress-bg {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 2px;
            overflow: hidden;
            position: relative;
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary));
            border-radius: 2px;
            position: relative;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.4);
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .progress-bar::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer {
            0% {
                transform: translateX(-100%);
            }

            100% {
                transform: translateX(100%);
            }
        }

        .loading-dots:after {
            content: '.';
            animation: dots 1.5s steps(4, end) infinite;
        }

        @keyframes dots {

            0%,
            20% {
                content: '.';
            }

            40% {
                content: '..';
            }

            60% {
                content: '...';
            }

            80%,
            100% {
                content: '';
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="logo-container">
            <h1 class="z-logo">Z</h1>
        </div>
        <h1>maxcord</h1>
        <div id="status" class="status">Проверка обновлений<span class="loading-dots"></span></div>
        <div id="progress-wrapper" class="progress-wrapper">
            <div class="progress-bg">
                <div id="progress-bar" class="progress-bar"></div>
            </div>
        </div>
    </div>

    <script>
        const { ipcRenderer } = require('electron');
        const statusElement = document.getElementById('status');
        const progressWrapper = document.getElementById('progress-wrapper');
        const progressBar = document.getElementById('progress-bar');

        ipcRenderer.on('updater-message', (event, text) => {
            statusElement.innerText = text;
        });

        ipcRenderer.on('updater-progress', (event, percent) => {
            progressWrapper.style.display = 'block';
            progressBar.style.width = percent + '%';
            statusElement.innerText = `Загрузка обновления: ${Math.round(percent)}%`;
        });
    </script>
</body>

</html>
